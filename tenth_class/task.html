<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
</head>
<body>
    <h2>A Simple HTML Form</h2>
    <form action="">
        <label for="userid">User Id:</label><br>
        <input type="text" id="userid" name="userid"><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"><br><br>
        <input type="checkbox" id="contact" name="contact">
        <label for="contact"> Add me to your conatact list</label><br><br>
        <input type="checkbox" id="mailing" name="mailing">
        <label for="mailing"> Add me to your mailing list</label><br><br>

        <label for="">Contact me by:</label> <br>
        <input type="radio" id="email" name="contact_method" value="email">
        <label for="email"> Email</label>
        <input type="radio" id="phone" name="contact_method" value="phone">
        <label for="phone"> Postal mail</label>
        <input type="radio" id="both" name="contact_method" value="both">
        <label for="both"> both</label><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
